# =============================================================================
# Example Splunk macros for ODCP testing
# =============================================================================

[authentication_events]
definition = index=main sourcetype=authentication OR index=main sourcetype=wineventlog EventCode=4625 OR EventCode=4624
iseval = 0

[sysmon_events]
definition = index=main sourcetype=XmlWinEventLog:Microsoft-Windows-Sysmon/Operational
iseval = 0

[normalize_process_fields]
definition = eval process_name=coalesce(Image, process_name, OriginalFileName) | eval process_path=coalesce(Image, process_path)
iseval = 0

[drop_dm_object_name(1)]
args = object_name
definition = rename "$object_name$.*" as "*"
iseval = 0
