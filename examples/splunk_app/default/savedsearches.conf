# =============================================================================
# Example Splunk saved searches (detections) for ODCP testing
# =============================================================================

[Detect Brute Force Login Attempts]
description = Detects multiple failed login attempts from a single source
search = `authentication_events` eventtype=failed_login \
  | stats count as attempts by src_ip, user \
  | where attempts > 10 \
  | lookup ip_reputation_lookup src_ip OUTPUT risk_score \
  | where risk_score > 50
alert.severity = 4
alert.suppress = 1
cron_schedule = */5 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time = now
action.email = 1
action.email.to = soc@example.com
disabled = 0

[Detect Lateral Movement via PsExec]
description = Identifies PsExec-style lateral movement
search = `sysmon_events` EventCode=1 \
  (Image="*\\psexec.exe" OR Image="*\\psexesvc.exe" OR OriginalFileName="psexec.c") \
  | `normalize_process_fields` \
  | lookup asset_lookup dest_host OUTPUT asset_criticality \
  | table _time, src_host, dest_host, user, Image, asset_criticality
alert.severity = 5
cron_schedule = */5 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time = now
action.notable = 1
disabled = 0

[Detect Data Exfiltration via DNS]
description = Detects unusually long DNS queries that may indicate DNS tunneling
search = | tstats count from datamodel=Network_Resolution where DNS.query_length > 50 \
  by DNS.src DNS.query \
  | `drop_dm_object_name(DNS)` \
  | where count > 100 \
  | `dns_tunnel_filter`
alert.severity = 4
cron_schedule = 0 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
action.risk = 1
disabled = 0

[Detect Suspicious PowerShell Execution]
description = Detects encoded or obfuscated PowerShell commands
search = `sysmon_events` EventCode=1 Image="*\\powershell.exe" \
  (CommandLine="*-enc*" OR CommandLine="*-EncodedCommand*" OR CommandLine="*bypass*") \
  | `normalize_process_fields` \
  | eval decoded=base64decode(CommandLine)
alert.severity = 3
cron_schedule = */10 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
action.notable = 1
disabled = 0

[Detect Unauthorized Cloud API Calls]
description = Detects API calls from unauthorized regions
search = `cloud_trail_events` \
  | lookup authorized_regions_lookup region OUTPUT is_authorized \
  | where is_authorized!="true" \
  | `cloud_anomaly_filter`
alert.severity = 4
cron_schedule = 0 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time = now
action.email = 1
disabled = 0

[Daily User Activity Summary]
description = Non-detection saved search for user reporting
search = index=main sourcetype=access_combined \
  | stats count by user \
  | sort -count
dispatch.earliest_time = -24h
dispatch.latest_time = now
disabled = 0
