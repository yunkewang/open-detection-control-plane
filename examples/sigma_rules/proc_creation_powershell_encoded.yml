title: Suspicious Encoded PowerShell Command Line
id: f4a3c3a0-1234-5678-9abc-def012345678
status: test
level: high
description: Detects encoded PowerShell command lines that may indicate obfuscation
author: ODCP Example
date: 2025/01/15
references:
    - https://attack.mitre.org/techniques/T1059/001/
tags:
    - attack.execution
    - attack.t1059.001
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\powershell.exe'
        CommandLine|contains:
            - '-enc'
            - '-EncodedCommand'
            - '-e '
    condition: selection
falsepositives:
    - Legitimate admin scripts
